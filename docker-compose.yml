version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    volumes:
      - django_static:/app/staticfiles
    environment:
      - DEBUG=0
      - AIVEN_REDIS_URI=redis://redis:6379
    expose:
      - 8000
    depends_on:
      - redis

  frontend:
    build: ./frontend
    expose:
      - 80

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend

volumes:
  django_static:
